services:
  - type: web
    name: causal-intervention-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: NEWSAPI_KEY
        sync: false
